services:
  - type: worker
    name: chatbot-soldadura
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot_telegram_soldadura_gemini_sqlite_rag.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false